<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream: #F4F1EA;
    --cream-2: #EBE7DC;
    --ink: #2B2723;
    --ink-soft: #6B6459;
    --clay: #D97757;
    --clay-soft: #F0DACE;
    --line: #DDD6C7;
    --white: #FFFFFF;
    --radius: 14px;
  }
  *{ box-sizing: border-box; }
  html,body{ height:100%; margin:0; }
  body{
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--cream);
    color: var(--ink);
    display:flex;
    flex-direction:column;
  }

  header{
    padding: 18px 28px;
    border-bottom: 1px solid var(--line);
    display:flex;
    align-items:center;
    gap:12px;
    background: var(--cream);
  }
  .logo{
    width: 30px; height:30px;
    border-radius: 8px;
    background: var(--clay);
    display:flex; align-items:center; justify-content:center;
    color:white; font-family:'Fraunces', serif; font-weight:600; font-size:16px;
    flex-shrink:0;
  }
  header h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size: 18px;
    margin:0;
    letter-spacing: -0.01em;
  }
  header .status{
    margin-left:auto;
    font-size:12px;
    color: var(--ink-soft);
    display:flex; align-items:center; gap:6px;
  }
  header .dot{
    width:7px;height:7px;border-radius:50%;background:#7A9B76;
  }
  header button{
    margin-left: 14px;
    border:1px solid var(--line);
    background:transparent;
    color: var(--ink-soft);
    font-family:'Inter',sans-serif;
    font-size:12px;
    padding:6px 12px;
    border-radius:8px;
    cursor:pointer;
  }
  header button:hover{ background: var(--cream-2); }

  #chat{
    flex:1;
    overflow-y:auto;
    padding: 32px max(24px, calc(50% - 380px));
    display:flex;
    flex-direction:column;
    gap: 22px;
  }

  .msg{ display:flex; gap:12px; max-width: 100%; animation: rise .25s ease; }
  @keyframes rise{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .msg .avatar{
    width:28px;height:28px;border-radius:7px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif; font-size:13px; font-weight:600;
    margin-top:2px;
  }
  .msg.user{ flex-direction:row-reverse; }
  .msg.user .avatar{ background: var(--ink); color: var(--cream); }
  .msg.assistant .avatar{ background: var(--clay); color:white; }

  .bubble{
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height:1.55;
    font-size:15px;
    white-space: pre-wrap;
  }
  .msg.assistant .bubble{
    background: var(--white);
    border: 1px solid var(--line);
    border-top-left-radius: 4px;
  }
  .msg.user .bubble{
    background: var(--ink);
    color: var(--cream);
    border-top-right-radius: 4px;
  }

  .confirm-card{
    background: var(--clay-soft);
    border: 1px solid #E3B79C;
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 14px;
    max-width: 520px;
  }
  .confirm-card .title{
    font-weight:600; margin-bottom:6px; display:flex; align-items:center; gap:6px;
  }
  .confirm-card code{
    display:block;
    background: rgba(0,0,0,0.05);
    padding:8px 10px;
    border-radius:8px;
    font-size:12.5px;
    margin: 8px 0;
    overflow-x:auto;
  }
  .confirm-actions{ display:flex; gap:8px; margin-top:10px; }
  .confirm-actions button{
    border:none; border-radius:8px; padding:8px 16px;
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600; cursor:pointer;
  }
  .btn-approve{ background: var(--ink); color: var(--cream); }
  .btn-deny{ background: transparent; color: var(--ink); border:1px solid var(--ink) !important; }

  .typing{ display:flex; gap:4px; padding: 8px 4px; }
  .typing span{
    width:6px;height:6px;border-radius:50%;background: var(--ink-soft);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2){ animation-delay:.15s; }
  .typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce{ 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-4px);} }

  footer{
    padding: 18px max(24px, calc(50% - 380px)) 26px;
    background: linear-gradient(to top, var(--cream) 60%, transparent);
  }
  #form{
    display:flex;
    align-items:flex-end;
    gap:10px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 10px 10px 10px 16px;
  }
  #input{
    flex:1;
    border:none;
    outline:none;
    resize:none;
    font-family:'Inter',sans-serif;
    font-size:15px;
    line-height:1.4;
    max-height: 160px;
    background:transparent;
    color: var(--ink);
  }
  #input::placeholder{ color: var(--ink-soft); }
  #send{
    background: var(--clay);
    border:none;
    color:white;
    width:36px;height:36px;
    border-radius:10px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    transition: opacity .15s;
  }
  #send:disabled{ opacity:.4; cursor:default; }
  .hint{
    text-align:center; font-size:11.5px; color:var(--ink-soft); margin-top:10px;
  }

  #chat::-webkit-scrollbar{ width:8px; }
  #chat::-webkit-scrollbar-thumb{ background: var(--line); border-radius:4px; }
</style>
</head>
<body>

<header>
  <div class="logo">A</div>
  <h1>Tu asistente</h1>
  <div class="status"><span class="dot"></span><span id="status-text">conectado</span></div>
  <button id="reset-btn">Nueva conversación</button>
</header>

<div id="chat"></div>

<footer>
  <form id="form">
    <textarea id="input" placeholder="Escribí un mensaje..." rows="1"></textarea>
    <button id="send" type="submit" aria-label="Enviar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M5 12l7-7 7 7" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </form>
  <div class="hint">Corre localmente en tu compu · sin conexión a servicios externos</div>
</footer>

<script>
const chatEl = document.getElementById('chat');
const form = document.getElementById('form');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusText = document.getElementById('status-text');
const resetBtn = document.getElementById('reset-btn');

function scrollDown(){ chatEl.scrollTop = chatEl.scrollHeight; }

function addMessage(role, text){
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'Vos' : 'A';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  scrollDown();
  return bubble;
}

function addTyping(){
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = `<div class="avatar">A</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatEl.appendChild(wrap);
  scrollDown();
}
function removeTyping(){
  const el = document.getElementById('typing-indicator');
  if(el) el.remove();
}

function addConfirmCard(callId, toolName, args){
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';
  const argsStr = JSON.stringify(args, null, 2);
  wrap.innerHTML = `
    <div class="avatar">A</div>
    <div class="confirm-card">
      <div class="title">⚠️ Quiere ejecutar: ${toolName}</div>
      <code>${argsStr.replace(/</g,'&lt;')}</code>
      <div class="confirm-actions">
        <button class="btn-approve">Permitir</button>
        <button class="btn-deny">Cancelar</button>
      </div>
    </div>`;
  chatEl.appendChild(wrap);
  scrollDown();

  wrap.querySelector('.btn-approve').onclick = () => resolveConfirm(callId, true, wrap);
  wrap.querySelector('.btn-deny').onclick = () => resolveConfirm(callId, false, wrap);
}

async function resolveConfirm(callId, approved, cardEl){
  cardEl.querySelectorAll('button').forEach(b => b.disabled = true);
  cardEl.style.opacity = '0.6';
  addTyping();
  const res = await fetch('/api/confirm', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({call_id: callId, approved})
  });
  const data = await res.json();
  removeTyping();
  handleResponse(data);
}

function handleResponse(data){
  if(data.type === 'confirm'){
    addConfirmCard(data.call_id, data.tool_name, data.args);
  } else if(data.type === 'message'){
    addMessage('assistant', data.content || '(sin respuesta)');
  } else if(data.error){
    addMessage('assistant', 'Error: ' + data.error);
  }
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if(!text) return;
  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  addTyping();

  try{
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message: text})
    });
    const data = await res.json();
    removeTyping();
    handleResponse(data);
  }catch(err){
    removeTyping();
    addMessage('assistant', 'No pude conectar con el servidor local. ¿Está corriendo server.py?');
    statusText.textContent = 'desconectado';
  }finally{
    sendBtn.disabled = false;
  }
});

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
});
input.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    form.requestSubmit();
  }
});

resetBtn.addEventListener('click', async () => {
  await fetch('/api/reset', {method:'POST'});
  chatEl.innerHTML = '';
  addMessage('assistant', 'Empezamos de nuevo. ¿En qué te ayudo?');
});

async function loadHistory(){
  try{
    const res = await fetch('/api/history');
    const data = await res.json();
    if(data.messages && data.messages.length){
      data.messages.forEach(m => addMessage(m.role, m.content));
      return;
    }
  }catch(err){
    // si falla, seguimos con el saludo por defecto / fall back to the default greeting
  }
  addMessage('assistant', 'Hola, soy tu asistente local. ¿En qué te ayudo?');
}
loadHistory();
</script>

</body>
</html>
